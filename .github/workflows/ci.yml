name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Enable pnpm
        shell: pwsh
        run: corepack enable

      - name: Install frontend dependencies
        shell: pwsh
        run: corepack pnpm install --frozen-lockfile

      - name: Install backend dependencies
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install -e ".\apps\api[dev,model]"

      - name: Install Playwright Chromium
        shell: pwsh
        run: corepack pnpm exec playwright install chromium

      - name: Verify source
        shell: pwsh
        run: |
          corepack pnpm format:check
          corepack pnpm lint
          corepack pnpm typecheck
          corepack pnpm test
          corepack pnpm build
          corepack pnpm e2e

      - name: Install and run Gitleaks
        shell: pwsh
        run: |
          $version = "8.30.1"
          $archive = Join-Path $env:RUNNER_TEMP "gitleaks.zip"
          $directory = Join-Path $env:RUNNER_TEMP "gitleaks"
          Invoke-WebRequest `
            -Uri "https://github.com/gitleaks/gitleaks/releases/download/v$version/gitleaks_${version}_windows_x64.zip" `
            -OutFile $archive
          Expand-Archive -Path $archive -DestinationPath $directory
          $gitleaks = Join-Path $directory "gitleaks.exe"
          & $gitleaks git --no-banner --redact .
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $gitleaks dir --no-banner --redact .
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
